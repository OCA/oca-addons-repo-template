name: test

on:
  pull_request:
  push:
    branches: [master]
  release:
    types: [created]

jobs:
  test:
    runs-on: ${{matrix.machine}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - odoo-version: 13.0
            python-version: 3.8
            machine: ubuntu-22.04
          - odoo-version: 14.0
            python-version: 3.8
            machine: ubuntu-22.04
          - odoo-version: 15.0
            python-version: 3.8
            machine: ubuntu-22.04
          - odoo-version: 16.0
            python-version: "3.10"
            machine: ubuntu-22.04
          - odoo-version: 17.0
            python-version: "3.10"
            machine: ubuntu-22.04
          - odoo-version: 18.0
            python-version: "3.12"
            machine: ubuntu-24.04
          - odoo-version: 19.0
            python-version: "3.12"
            machine: ubuntu-24.04
    steps:
      # Prepare environment
      - uses: actions/checkout@v4

      # On python>=3.9, we can use pip install --group=dev,
      # but the latest pip that supports python 3.8 does not have
      # --group, so we use uv.
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      # Let tests issue git commits
      - run: git config --global user.name CI
      - run: git config --global user.email CI@GITHUB

      # Run all tests
      - run: uv run pytest --color yes -v
        env:
          SELECTED_ODOO_VERSIONS: ${{ matrix.odoo-version }}
